<div class="table-responsive">
  <table class="table table-bordered">
    <thead>
      <tr>
        <th *ngFor="let column of columns">{{ column.label }}</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let row of pagedData; let i = index">
        <td *ngFor="let column of columns">
          <ng-container *ngIf="column.template; else defaultCell">
            <ng-container
              *ngTemplateOutlet="column.template; context: { $implicit: row }"
            ></ng-container>
          </ng-container>
          <ng-template #defaultCell>
            {{ row[column.key] }}
          </ng-template>
        </td>
      </tr>

      <tr *ngIf="pagedData.length === 0">
        <td [attr.colspan]="columns.length" class="empty-state-cell">
          <div class="empty-text">{{ emptyMessage }}</div>
        </td>
      </tr>
    </tbody>
  </table>
</div>

<!-- Pagination with showing text (always shown if collectionSize > 0) -->
<div
  *ngIf="collectionSize > pageSize"
  class="pagination-wrapper d-flex justify-content-between align-items-center mt-3"
>
  <div class="showing-text">
    Showing {{ showingRange.start }} to {{ showingRange.end }} of
    {{ showingRange.total }} entries
  </div>
  <ngb-pagination
    [collectionSize]="collectionSize"
    [(page)]="page"
    [pageSize]="pageSize"
    [maxSize]="12"
    (pageChange)="onPageChange($event)"
    class="mb-0"
  ></ngb-pagination>
</div>
