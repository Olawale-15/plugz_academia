<div class="staff-profile-container mt-4">
  <div class="card">
    <div class="card-body">
      <!-- Header Section with Search and New Button -->
      <div class="profile-header">
        <div class="search-section">
          <div class="search-wrapper">
            <app-icon [icon]="'search'" class="search-icon"></app-icon>
            <input
              type="text"
              class="search-input"
              placeholder="Search staff by name, ID, email, role..."
              [(ngModel)]="searchQuery"
            />
          </div>
        </div>
        <button class="btn-new" (click)="onNewStaff()">
          <app-icon [icon]="'plus'" class="btn-icon"></app-icon>
          New Staff
        </button>
      </div>

      <!-- Table -->
      <app-prime-table
        [data]="filteredStaff"
        [columns]="columns"
        [actions]="actions"
        [rows]="5"
        [rowsPerPageOptions]="[10, 25, 50]"
        [paginator]="true"
        [striped]="true"
        [globalFilterFields]="[
          'name',
          'staffId',
          'email',
          'role',
          'department'
        ]"
      >
        <!-- Custom Body Template for Status Column -->
        <ng-template #bodyTemplate let-rowData let-field="field">
          <ng-container [ngSwitch]="field">
            <ng-container *ngSwitchCase="'status'">
              <span
                class="status-badge"
                [class.status-active]="rowData.status === 'Active'"
                [class.status-inactive]="rowData.status === 'Inactive'"
              >
                {{ rowData.status }}
              </span>
            </ng-container>
            <ng-container *ngSwitchDefault>
              {{ rowData[field] }}
            </ng-container>
          </ng-container>
        </ng-template>
      </app-prime-table>
    </div>
  </div>
</div>
