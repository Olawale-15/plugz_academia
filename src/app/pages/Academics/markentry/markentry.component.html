<div class="mark-entry-container mt-4">
  <div class="card">
    <div class="card-body">
      <!-- Header Section with Search and New Button -->
      <div class="mark-entry-header">
        <div class="search-section">
          <div class="search-wrapper">
            <app-icon [icon]="'search'" class="search-icon"></app-icon>
            <input
              type="text"
              class="search-input"
              placeholder="Search marks by student, subject..."
              [(ngModel)]="searchQuery"
            />
          </div>
        </div>
        <button class="btn-new" (click)="onNewMarkEntry()">
          <app-icon [icon]="'plus'" class="btn-icon"></app-icon>
          New Entry
        </button>
      </div>

      <!-- Table -->
      <app-prime-table
        [data]="filteredMarkEntries"
        [columns]="columns"
        [actions]="actions"
        [rows]="5"
        [rowsPerPageOptions]="[5, 10, 25]"
        [paginator]="true"
        [striped]="true"
        [globalFilterFields]="[
          'studentName',
          'studentId',
          'subject',
          'assessmentType'
        ]"
      >
        <!-- Custom Body Template for Status Column -->
        <ng-template #bodyTemplate let-rowData let-field="field">
          <ng-container [ngSwitch]="field">
            <ng-container *ngSwitchCase="'status'">
              <span
                class="status-badge"
                [class.status-submitted]="rowData.status === 'Submitted'"
                [class.status-pending]="rowData.status === 'Pending'"
                [class.status-draft]="rowData.status === 'Draft'"
              >
                {{ rowData.status }}
              </span>
            </ng-container>
            <ng-container *ngSwitchDefault>
              {{ rowData[field] }}
            </ng-container>
          </ng-container>
        </ng-template>
      </app-prime-table>
    </div>
  </div>
</div>
