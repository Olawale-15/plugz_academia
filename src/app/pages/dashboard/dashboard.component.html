<div class="dashboard-container mt-4">
  <!-- Statistics Cards -->
  <div class="row g-3 mb-4">
    <div
      *ngFor="let card of dashboardCards"
      class="col-lg-3 col-md-6 col-sm-6 col-12"
    >
      <div class="stat-card" [style.border-left]="'2px solid ' + card.color">
        <div class="stat-card-content">
          <div class="stat-info">
            <h3 class="stat-title">{{ card.title }}</h3>
            <div class="stat-number">
              {{ formatNumber(card.count, card.prefix || "") }}
            </div>
            <div class="stat-change" [ngClass]="'change-' + card.changeType">
              <app-icon
                [icon]="
                  card.changeType === 'increase'
                    ? 'trending-up'
                    : card.changeType === 'decrease'
                    ? 'trending-down'
                    : 'minus'
                "
                size="12"
                class="change-icon"
              ></app-icon>
              {{ card.change }} from last month
            </div>
          </div>
          <div class="stat-icon" [style.background-color]="card.bgColor">
            <app-icon
              [icon]="card.icon"
              size="18"
              [style.color]="card.color"
            ></app-icon>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Charts and Activities Section -->
  <div class="row g-3 mb-4">
    <!-- Enrollment Trend Chart -->
    <div class="col-xl-8 col-lg-7 col-md-12">
      <div class="chart-card h-100">
        <div class="card-header">
          <h2 class="card-title">Enrollment Trends</h2>
          <p class="card-subtitle">Student enrollment over the last 6 terms</p>
        </div>
        <div class="chart-container">
          <canvas
            baseChart
            [type]="enrollmentChartType"
            [data]="enrollmentChartData"
            [options]="enrollmentChartOptions"
          ></canvas>
        </div>
      </div>
    </div>

    <!-- Recent Activities -->
    <div class="col-xl-4 col-lg-5 col-md-12">
      <div class="activities-card h-100">
        <div class="card-header">
          <h2 class="card-title">Recent Activities</h2>
          <p class="card-subtitle">Latest updates and notifications</p>
        </div>
        <div class="activities-list">
          <div *ngFor="let activity of recentActivities" class="activity-item">
            <div
              class="activity-icon"
              [style.background-color]="activity.color + '20'"
            >
              <app-icon
                [icon]="activity.icon"
                size="16"
                [style.color]="activity.color"
              ></app-icon>
            </div>
            <div class="activity-content">
              <p class="activity-message">{{ activity.message }}</p>
              <span class="activity-time">{{ activity.time }}</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Quick Actions -->
  <div class="row">
    <div class="col-12">
      <div class="quick-actions">
        <h2 class="section-title">Quick Actions</h2>
        <div class="row g-2">
          <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6 col-6">
            <button class="action-btn w-100">
              <app-icon icon="user-plus" size="20"></app-icon>
              <span>Add Student</span>
            </button>
          </div>
          <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6 col-6">
            <button class="action-btn w-100">
              <app-icon icon="users" size="20"></app-icon>
              <span>Manage Classes</span>
            </button>
          </div>
          <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6 col-6">
            <button class="action-btn w-100">
              <app-icon icon="calendar" size="20"></app-icon>
              <span>Schedule Class</span>
            </button>
          </div>
          <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6 col-6">
            <button class="action-btn w-100">
              <app-icon icon="credit-card" size="20"></app-icon>
              <span>Record Payment</span>
            </button>
          </div>
          <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6 col-6">
            <button class="action-btn w-100">
              <app-icon icon="file-text" size="20"></app-icon>
              <span>Generate Report</span>
            </button>
          </div>
          <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6 col-6">
            <button class="action-btn w-100">
              <app-icon icon="settings" size="20"></app-icon>
              <span>Settings</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
